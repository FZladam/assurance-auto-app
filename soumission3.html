<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Soumission assurance auto</title>
</head>

<body class="fond">
  <header>
    <div class="en_tete">
      <a href="index.html" class="logo">AssurFZ</a>

      <nav class="menu">
        <a href="index.html">Accueil</a>
        <a href="soumission.html">Soumission</a>
      </nav>
    </div>
  </header>

  <div class="soumission-contenu">

    <section class="soumission-intro">
      <h1 class="s-titre">Soumission d'assurance auto</h1>
      <p class="intro">Répondez aux questions suivantes pour obtenir votre soumission </p>
    </section>

    <form id="form-soumission3">
      <!-- Année de véhicule -->
      <label for="annee" class="texte">Quelle est l'année de fabrication de votre véhicule?</label><br>
      <input type="number" id="annee" name="annee" placeholder="Ex. 2020" min="1980" max="2026" class="champ">
      <p id="err-annee" class="msg-erreur"></p>
      <br>

      <!-- Kilomètrage -->
      <label for="km" class="texte">Combien de kilomètres parcourez-vous par année?</label><br>
      <input type="number" id="km" name="km" placeholder="Ex. 15000" min="0" step="1" class="champ">
      <p id="err-km" class="msg-erreur"></p>
      <br>

      <!-- Caméra de recul -->
      <label class="texte">Est-ce que votre véhicule possède une caméra de recul?</label><br>
      <input type="radio" id="camera1" name="camera" value="oui">
      <label for="camera1" class="texte">Oui</label>
      <input type="radio" id="camera2" name="camera" value="non">
      <label for="camera2" class="texte">Non</label>
      <p id="err-camera" class="msg-erreur"></p>
      <br>

      <!-- Réclamations -->
      <label class="texte">Avez-vous fait des réclamations d'assurance auto dans les 6 dernières années?</label><br>
      <input type="radio" id="reclamations-oui" name="reclamations" value="oui">
      <label for="reclamations-oui" class="texte">Oui</label>

      <input type="radio" id="reclamations-non" name="reclamations" value="non">
      <label for="reclamations-non" class="texte">Non</label>
      <p id="err-reclamations" class="msg-erreur"></p>
      <br>

      <!-- Nombre de réclamations (affiché seulement si l'utilisateur coche oui)-->
      <div id="section-reclamations">
        <label for="nbrReclamations">Combien de réclamations avez-vous faites ?</label><br>
        <input type="number" id="nbrReclamations" class="champ" name="nbrReclamations" min="1" step="1" placeholder="Ex. 3">
        <p id="err-nbrReclamations" class="msg-erreur"></p><br>

        <div id="rec_montants"></div>
        <p id="err-rec-montants" class="msg-erreur"></p>
      </div>

      <button type="submit" id="button-3" class="bouton-soumission">Obtenir ma soumission</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>

</html>
